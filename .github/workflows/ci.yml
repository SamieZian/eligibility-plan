name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install
        run: |
          pip install -e libs/python-common
          pip install ruff pytest pytest-asyncio fastapi 'uvicorn[standard]' \
            sqlalchemy asyncpg 'psycopg[binary]' alembic httpx pydantic pydantic-settings \
            structlog tenacity cryptography redis google-cloud-pubsub \
            'strawberry-graphql[fastapi]' \
            opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp \
            opentelemetry-instrumentation-fastapi opentelemetry-instrumentation-sqlalchemy
      - run: ruff check .
      - name: Unit tests
        env:
          DATABASE_URL: postgresql+psycopg://x@x/x
          ATLAS_URL: http://x
          MEMBER_URL: http://x
          GROUP_URL: http://x
          PLAN_URL: http://x
          OPENSEARCH_URL: http://x
          MINIO_ENDPOINT: http://x
          MINIO_BUCKET: b
          MINIO_ROOT_USER: u
          MINIO_ROOT_PASSWORD: p
        run: PYTHONPATH=.:libs/python-common/src python -m pytest tests -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t eligibility-plan:ci .
